<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Publish HTML, Markdown, or prebuilt static sites to an immutable temporary URL with one request.">
  <link rel="help" href="/agents">
  <title>Tabucom · Temporary static hosting</title>
  <style>
    :root{--ink:#17201f;--muted:#5e6966;--paper:#f5f1e9;--line:#d9d3c7;--accent:#0c7569}
    *{box-sizing:border-box}
    body{margin:0;color:var(--ink);background:radial-gradient(circle at 88% 18%,#f7cdb7 0,transparent 30%),linear-gradient(145deg,#e2f2e9,#f7f0e5 66%);font:16px/1.6 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{min-height:100svh;display:grid;place-items:center;padding:40px 18px}
    .hero{width:min(920px,100%)}
    .eyebrow{margin:0 0 16px;color:var(--accent);font-size:.76rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase}
    h1{max-width:850px;margin:0;font:700 clamp(3rem,9vw,7rem)/.94 Georgia,serif;letter-spacing:-.055em}
    .lede{max-width:720px;margin:28px 0 0;color:var(--muted);font-size:clamp(1.1rem,2.2vw,1.4rem)}
    .agent-link{display:inline-block;margin-top:42px;color:var(--muted);font-size:.82rem;text-decoration-color:color-mix(in srgb,var(--muted) 40%,transparent);text-underline-offset:4px}
    .agent-link:hover,.agent-link:focus-visible{color:var(--accent);text-decoration-color:currentColor}
    .agent-link:focus-visible{outline:2px solid var(--accent);outline-offset:5px;border-radius:2px}
    @media(max-width:600px){main{place-items:end start;padding-bottom:56px}.agent-link{margin-top:32px}}
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="title">
      <p class="eyebrow">Tabucom · temporary static hosting</p>
      <h1 id="title">Publish a front end. Get a URL.</h1>
      <p class="lede">Send HTML, Markdown, or a prebuilt static site. Tabucom publishes it as an immutable URL, optionally protects it with one password, then removes it automatically when its lifetime ends.</p>
      <a class="agent-link" href="/agents" rel="help">Instructions for AI agents <span aria-hidden="true">→</span></a>
    </section>
  </main>
</body>
</html>
