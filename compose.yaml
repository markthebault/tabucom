services:
  publisher:
    build: .
    restart: unless-stopped
    ports:
      - "${PUBLISH_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DATA_DIR: /data
      TTL: "${TTL:-720h}"
      PUBLIC_API_URL: "${PUBLIC_API_URL:-http://localhost:8080}"
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-104857600}"
      MAX_EXPANDED_BYTES: "${MAX_EXPANDED_BYTES:-524288000}"
    volumes:
      - publisher-data:/data

volumes:
  publisher-data:
