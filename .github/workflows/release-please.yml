name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write

env:
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
  IMAGE_PLATFORM: ${{ vars.DOCKER_IMAGE_PLATFORM || 'linux/amd64' }}

jobs:
  release-please:
    name: Update release PR or publish release
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Set up Go
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run checks
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: make check

      - name: Build release binaries
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: ./scripts/build-release.sh "${{ steps.release.outputs.tag_name }}"

      - name: Upload binaries to release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" dist/* --clobber

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release image metadata
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag_name }}
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push release image
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.IMAGE_PLATFORM }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
