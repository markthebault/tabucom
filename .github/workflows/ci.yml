name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ vars.DOCKER_IMAGE_TAG || 'latest' }}
  IMAGE_PLATFORM: ${{ vars.DOCKER_IMAGE_PLATFORM || 'linux/amd64' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          fmt_out="$(gofmt -l ./cmd ./internal)"
          test -z "$fmt_out" || {
            echo "$fmt_out"
            exit 1
          }

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Validate embedded JSON
        run: |
          python3 -m json.tool internal/server/web/openapi.json >/dev/null
          python3 -m json.tool internal/server/web/.well-known/agent.json >/dev/null

      - name: Build binary
        run: make build

  publish-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: make docker-push
